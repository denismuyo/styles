<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Style Generator</title>

<!-- Google Fonts: Playfair Display + DM Sans -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ============================================================
   CSS CUSTOM PROPERTIES — Design Tokens
   ============================================================ */
:root {
  --pink:        #ff4e8d;
  --violet:      #9b4dff;
  --gold:        #f5c97a;
  --surface:     rgba(255,255,255,0.04);
  --surface-mid: rgba(255,255,255,0.08);
  --border:      rgba(255,255,255,0.10);
  --text-primary: #f0eef8;
  --text-muted:   rgba(240,238,248,0.45);
  --card-radius:  22px;
  --transition-fast: 0.2s ease;
  --transition-med:  0.4s cubic-bezier(0.4,0,0.2,1);
  --spin-duration: 4s;
  --glow-pink:   0 0 40px rgba(255,78,141,0.45);
  --glow-violet: 0 0 40px rgba(155,77,255,0.45);
}

/* ============================================================
   RESET + BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  color: var(--text-primary);
  background: #09080f;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
  position: relative;
  /* IMPROVEMENT: Subtle grain texture adds premium depth */
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
}

/* ============================================================
   BACKGROUND VIDEO — full-bleed cinematic
   ============================================================ */
.bg-video {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -3;
  /* IMPROVEMENT: slight scale so edges never flash */
  transform: scale(1.05);
}

/* ============================================================
   LAYERED OVERLAY SYSTEM — depth + atmosphere
   ============================================================ */
/* Layer 1: Base dark scrim */
.overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(170deg,
    rgba(9,8,15,0.88) 0%,
    rgba(14,10,28,0.92) 60%,
    rgba(9,8,15,0.96) 100%
  );
  z-index: -2;
}

/* Layer 2: Ambient color orbs for atmosphere */
/* IMPROVEMENT: Soft radial color pools create depth & mood */
.ambient {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  overflow: hidden;
}
.ambient::before {
  content: '';
  position: absolute;
  top: -15%;
  left: -10%;
  width: 60vw;
  height: 60vw;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(155,77,255,0.12) 0%, transparent 70%);
  animation: floatOrb 12s ease-in-out infinite alternate;
}
.ambient::after {
  content: '';
  position: absolute;
  bottom: -10%;
  right: -10%;
  width: 55vw;
  height: 55vw;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,78,141,0.10) 0%, transparent 70%);
  animation: floatOrb 15s ease-in-out infinite alternate-reverse;
}

@keyframes floatOrb {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(4%, 3%) scale(1.08); }
}

/* ============================================================
   LAYOUT WRAPPER
   ============================================================ */
.app-wrapper {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 24px 56px;
  gap: 0;
}

/* ============================================================
   HEADER — Playfair Display for editorial elegance
   ============================================================ */
.header {
  text-align: center;
  margin-bottom: 44px;
}

.header__eyebrow {
  /* IMPROVEMENT: Eyebrow label adds intentional hierarchy */
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 12px;
  /* Subtle gradient text */
  background: linear-gradient(90deg, var(--pink), var(--violet));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header__title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 6vw, 56px);
  font-weight: 600;
  line-height: 1.1;
  letter-spacing: -0.5px;
  /* IMPROVEMENT: Subtle gradient title feels premium */
  background: linear-gradient(135deg, #f0eef8 10%, rgba(240,238,248,0.65) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header__title em {
  font-style: italic;
  background: linear-gradient(135deg, var(--pink), var(--violet));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ============================================================
   CAROUSEL WRAPPER
   ============================================================ */
.carousel-wrapper {
  width: 100%;
  max-width: 960px;
  overflow: hidden;
  position: relative;
  /* IMPROVEMENT: Fade masks on edges show depth and continuity */
  mask-image: linear-gradient(
    to right,
    transparent 0%,
    black 12%,
    black 88%,
    transparent 100%
  );
  -webkit-mask-image: linear-gradient(
    to right,
    transparent 0%,
    black 12%,
    black 88%,
    transparent 100%
  );
  padding: 20px 0 28px;
}

/* ============================================================
   CAROUSEL TRACK
   ============================================================ */
.carousel {
  display: flex;
  /* IMPROVEMENT: will-change tells browser to prep GPU layer */
  will-change: transform;
  transition: transform var(--spin-duration) cubic-bezier(0.05, 0.9, 0.1, 1);
}

/* ============================================================
   CARD
   ============================================================ */
.card {
  /* IMPROVEMENT: min-width uses clamp for fluid sizing */
  min-width: clamp(220px, 62vw, 380px);
  height: clamp(240px, 38vw, 400px);
  margin: 0 12px;
  border-radius: var(--card-radius);
  overflow: hidden;
  background: var(--surface);
  /* IMPROVEMENT: Glass border adds luxury depth */
  border: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow:
    0 8px 32px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.07);
  flex-shrink: 0;
  position: relative;
  cursor: pointer;
  /* IMPROVEMENT: Smooth scale transition on hover */
  transition:
    transform var(--transition-fast),
    box-shadow var(--transition-fast),
    border-color var(--transition-fast);
}

.card:hover {
  transform: translateY(-4px) scale(1.015);
  box-shadow:
    0 18px 48px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.10);
  border-color: rgba(255,255,255,0.18);
}

.card__img-wrap {
  width: 100%;
  height: 82%;
  overflow: hidden;
  position: relative;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  /* IMPROVEMENT: Image zoom on hover feels interactive */
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
}

.card:hover img {
  transform: scale(1.06);
}

/* IMPROVEMENT: Gradient scrim over image bottom for text legibility */
.card__img-wrap::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 40%;
  background: linear-gradient(to top, rgba(9,8,15,0.7) 0%, transparent 100%);
  pointer-events: none;
}

.card__label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 10px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: clamp(12px, 2vw, 14px);
  font-weight: 400;
  color: var(--text-primary);
  text-align: center;
  letter-spacing: 0.3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ============================================================
   HIGHLIGHT — selected card stands out powerfully
   ============================================================ */
/* IMPROVEMENT: Multi-layer glow + scale + border for unmistakable selection */
.card.highlight {
  transform: scale(1.07) translateY(-6px);
  border-color: rgba(255,78,141,0.7);
  box-shadow:
    0 0 0 1px rgba(155,77,255,0.5),
    0 0 60px rgba(255,78,141,0.4),
    0 0 100px rgba(155,77,255,0.25),
    0 24px 60px rgba(0,0,0,0.7),
    inset 0 1px 0 rgba(255,255,255,0.15);
  animation: pulseGlow 2.5s ease-in-out infinite;
}

/* IMPROVEMENT: Animated glow ring draws the eye */
.card.highlight::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: calc(var(--card-radius) + 2px);
  background: linear-gradient(135deg, var(--pink), var(--violet), var(--pink));
  background-size: 200% 200%;
  animation: gradientShift 3s ease infinite;
  z-index: -1;
  opacity: 0.9;
}

@keyframes pulseGlow {
  0%, 100% { box-shadow: 0 0 0 1px rgba(155,77,255,0.5), 0 0 60px rgba(255,78,141,0.4), 0 0 100px rgba(155,77,255,0.25), 0 24px 60px rgba(0,0,0,0.7); }
  50%       { box-shadow: 0 0 0 2px rgba(155,77,255,0.7), 0 0 80px rgba(255,78,141,0.55), 0 0 130px rgba(155,77,255,0.35), 0 24px 60px rgba(0,0,0,0.7); }
}

@keyframes gradientShift {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* ============================================================
   GENERATE BUTTON
   ============================================================ */
/* IMPROVEMENT: Rich layered button with shimmer micro-interaction */
.btn-generate {
  margin-top: 44px;
  padding: 16px 48px;
  border-radius: 100px;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 0.5px;
  cursor: pointer;
  color: #fff;
  position: relative;
  overflow: hidden;
  background: linear-gradient(135deg, var(--pink) 0%, var(--violet) 100%);
  box-shadow:
    0 4px 24px rgba(155,77,255,0.35),
    0 1px 0 rgba(255,255,255,0.15) inset;
  transition:
    transform var(--transition-fast),
    box-shadow var(--transition-fast),
    opacity var(--transition-fast);
  /* Accessibility */
  outline: none;
  -webkit-tap-highlight-color: transparent;
}

/* Shimmer sweep on hover */
.btn-generate::before {
  content: '';
  position: absolute;
  top: 0; left: -80%;
  width: 60%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent 0%,
    rgba(255,255,255,0.22) 50%,
    transparent 100%
  );
  transform: skewX(-20deg);
  transition: left 0.55s ease;
}

.btn-generate:hover::before {
  left: 130%;
}

.btn-generate:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow:
    0 8px 36px rgba(155,77,255,0.5),
    0 1px 0 rgba(255,255,255,0.18) inset;
}

.btn-generate:active {
  transform: translateY(0) scale(0.97);
  box-shadow: 0 2px 12px rgba(155,77,255,0.3);
}

/* IMPROVEMENT: Focus ring for keyboard accessibility */
.btn-generate:focus-visible {
  outline: 2px solid var(--pink);
  outline-offset: 4px;
}

/* Spinning state — button shows activity */
.btn-generate.spinning {
  pointer-events: none;
  opacity: 0.7;
}

.btn-generate.spinning .btn-text { display: none; }
.btn-generate .btn-spinner { display: none; }
.btn-generate.spinning .btn-spinner { display: inline-block; }

/* IMPROVEMENT: Pill-spinner inside button while animating */
.btn-spinner {
  width: 18px;
  height: 18px;
  border: 2.5px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ============================================================
   RESULT TEXT — dramatic reveal
   ============================================================ */
.result-wrap {
  margin-top: 28px;
  min-height: 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.result {
  font-family: 'Playfair Display', serif;
  font-size: clamp(20px, 4.5vw, 32px);
  font-style: italic;
  font-weight: 400;
  text-align: center;
  letter-spacing: 0.3px;
  /* IMPROVEMENT: Gradient text for result payoff moment */
  background: linear-gradient(135deg, var(--pink), var(--gold) 50%, var(--violet));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  /* Hidden by default, animates in */
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}

.result.visible {
  opacity: 1;
  transform: translateY(0);
}

.result-sub {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  opacity: 0;
  transition: opacity 0.6s ease 0.15s;
}

.result-sub.visible {
  opacity: 1;
}

/* ============================================================
   PARTICLE BURST — celebratory micro-interaction on reveal
   ============================================================ */
.particles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 500;
  overflow: hidden;
}

.particle {
  position: absolute;
  border-radius: 50%;
  animation: particleFly 1.2s ease-out forwards;
  opacity: 0;
}

@keyframes particleFly {
  0%   { opacity: 1; transform: translate(0,0) scale(1); }
  100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
}

/* ============================================================
   FULLSCREEN MODAL — premium reveal
   ============================================================ */
/* IMPROVEMENT: Backdrop blur + fade-scale transition */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(5,4,12,0.75);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
  padding: 24px;
}

.modal.active {
  opacity: 1;
  pointer-events: all;
}

.modal__inner {
  position: relative;
  max-width: 90vw;
  max-height: 90vh;
  display: flex;
  justify-content: center;
  align-items: center;
  transform: scale(0.92);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

.modal.active .modal__inner {
  transform: scale(1);
}

.modal img {
  max-width: 100%;
  max-height: 85vh;
  border-radius: 16px;
  display: block;
  box-shadow:
    0 32px 80px rgba(0,0,0,0.7),
    0 0 0 1px rgba(255,255,255,0.08);
}

/* IMPROVEMENT: Pill close button with backdrop blur */
.modal__close {
  position: absolute;
  top: -16px;
  right: -16px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: #fff;
  font-size: 18px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition-fast), transform var(--transition-fast);
}

.modal__close:hover {
  background: rgba(255,78,141,0.4);
  transform: scale(1.1) rotate(90deg);
}

/* IMPROVEMENT: "Tap anywhere to close" hint */
.modal__hint {
  position: absolute;
  bottom: -40px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  white-space: nowrap;
}

/* ============================================================
   FOOTER FLOURISH — subtle branding line
   ============================================================ */
.footer {
  margin-top: 60px;
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0.25;
}

.footer__line {
  width: 40px;
  height: 1px;
  background: var(--text-primary);
}

.footer__text {
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--text-primary);
}

/* ============================================================
   SCROLLBAR — refined dark style
   ============================================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

/* ============================================================
   RESPONSIVE TWEAKS
   ============================================================ */
@media (max-width: 480px) {
  .btn-generate { padding: 14px 36px; font-size: 15px; }
  .header { margin-bottom: 32px; }
  .app-wrapper { padding: 36px 16px 48px; }
}

</style>
</head>

<body>

<!-- Background Video -->
<video class="bg-video" autoplay muted loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<!-- Dark + gradient overlay -->
<div class="overlay"></div>

<!-- Ambient color orbs -->
<div class="ambient"></div>

<!-- Particle container -->
<div class="particles" id="particles"></div>

<!-- ============================================================
     MAIN APP
     ============================================================ -->
<div class="app-wrapper">

  <!-- Header -->
  <header class="header">
    <p class="header__eyebrow">Tonight's Ritual</p>
    <h1 class="header__title">Generate Your <em>Style</em></h1>
  </header>

  <!-- Carousel -->
  <div class="carousel-wrapper">
    <div class="carousel" id="carousel"></div>
  </div>

  <!-- CTA Button -->
  <button class="btn-generate" id="generateBtn" onclick="generateStyle()">
    <span class="btn-text">✦ Generate Style</span>
    <span class="btn-spinner"></span>
  </button>

  <!-- Result reveal -->
  <div class="result-wrap">
    <p class="result-sub" id="resultSub">Tonight's Style</p>
    <p class="result"    id="resultText"></p>
  </div>

  <!-- Footer flourish -->
  <footer class="footer">
    <div class="footer__line"></div>
    <span class="footer__text">Crafted with passion</span>
    <div class="footer__line"></div>
  </footer>

</div><!-- /app-wrapper -->

<!-- Fullscreen Modal -->
<div class="modal" id="imageModal" onclick="closeModal()">
  <div class="modal__inner" onclick="event.stopPropagation()">
    <img id="modalImage" alt="Style preview" />
    <button class="modal__close" onclick="closeModal()" aria-label="Close">✕</button>
    <p class="modal__hint">Tap anywhere to close</p>
  </div>
</div>

<!-- ============================================================
     JAVASCRIPT — all logic preserved, UX upgrades added
     ============================================================ -->
<script>

/* ── DATA ────────────────────────────────────────────── */
const styles = [
  { name: "Afternoon Delight",   image: "Afternoon Delight.jpg" },
  { name: "Arch",                image: "arch.jpg" },
  { name: "Basset Hound",        image: "basset.jpg" },
  { name: "Bend Over",           image: "bendover.jpg" },
  { name: "Bent Spoons",         image: "bentspoons.png" },
  { name: "Bodyguard",           image: "Bodyguard.jpg" },
  { name: "Booster Seat",        image: "Booster Seat.jpg" },
  { name: "Bulldog",             image: "Bulldog.jpg" },
  { name: "Butterfly",           image: "butterfly.jpg" },
  { name: "Cannonball",          image: "Cannonball.jpg" },
  { name: "Cowboy",              image: "Cowboy.jpg" },
  { name: "Reverse Cowboy",      image: "Reverse Cowboy.jpg" },
  { name: "Crab",                image: "Crab.jpg" },
  { name: "Danseur",             image: "Danseur.jpg" },
  { name: "Deep Impact",         image: "Deep Impact.jpg" },
  { name: "Deep Stick",          image: "Deep Stick.jpg" },
  { name: "Doggy Style",         image: "Doggy Style.jpg" },
  { name: "Elevated Doggy Style",image: "Elevated Doggy Style.jpg" },
  { name: "Standing Doggy Style",image: "Standing Doggy Style.jpg" },
  { name: "Fire Hydrant",        image: "Fire Hydrant.jpg" },
  { name: "Folded Deck Chair",   image: "Folded Deck Chair.jpg" },
  { name: "Fusion",              image: "Fusion.jpg" },
  { name: "Launch Pad",          image: "Launch Pad.jpg" },
  { name: "Leg Glider",          image: "Leg Glider.jpg" },
  { name: "Lotus",               image: "Lotus.png" },
  { name: "Mastery",             image: "Mastery.jpg" },
  { name: "Missionary",          image: "Missionary.jpg" },
  { name: "Pile Driver",         image: "Pile Driver.jpg" },
  { name: "Prison Guard",        image: "Prison Guard.jpg" },
  { name: "Pyramid",             image: "Pyramid.jpg" },
  { name: "Rear Entry",          image: "Rear Entry.jpg" },
  { name: "Scissors",            image: "Scissors.jpg" },
  { name: "Screw",               image: "Screw.jpg" },
  { name: "Spoons",              image: "Spoons.jpg" },
  { name: "Suspended Congress",  image: "Suspended Congress.jpg" },
  { name: "Teaspoons",           image: "Teaspoons.jpg" },
  { name: "Warrior",             image: "Warrior.jpg" }
];

/* ── BUILD CAROUSEL ──────────────────────────────────── */
const carousel   = document.getElementById("carousel");
const resultText = document.getElementById("resultText");
const resultSub  = document.getElementById("resultSub");
const generateBtn= document.getElementById("generateBtn");

const repeatCount = 6;
const fullList    = [];
for (let i = 0; i < repeatCount; i++) fullList.push(...styles);

fullList.forEach(style => {
  const card = document.createElement("div");
  card.classList.add("card");
  card.innerHTML = `
    <div class="card__img-wrap">
      <img
        src="${style.image}"
        alt="${style.name}"
        loading="lazy"
        onclick="openModal('${style.image}', '${style.name.replace(/'/g,"&#39;")}')"
      />
    </div>
    <p class="card__label">${style.name}</p>
  `;
  carousel.appendChild(card);
});

/* ── GENERATE STYLE ──────────────────────────────────── */
// IMPROVEMENT: Button locked during animation; spinner shown for perceived performance
let isSpinning = false;

function generateStyle() {
  if (isSpinning) return;
  isSpinning = true;

  // Reset previous state
  document.querySelectorAll(".card").forEach(c => c.classList.remove("highlight"));
  resultText.classList.remove("visible");
  resultSub.classList.remove("visible");
  resultText.textContent = "";

  // Button spinning state
  generateBtn.classList.add("spinning");

  // Measure card width (including margin)
  const cardEl    = document.querySelector(".card");
  const cardWidth = cardEl.offsetWidth + 24; // 24 = 2 × 12px margin

  // Random selection (original logic preserved)
  const randomIndex  = Math.floor(Math.random() * styles.length);
  const middleOffset = styles.length * 3;
  const finalIndex   = middleOffset + randomIndex;
  const finalPosition = -(finalIndex * cardWidth);

  // IMPROVEMENT: "Anticipation" — small opposite nudge before launching
  carousel.style.transition = "transform 0.25s cubic-bezier(0.4,0,1,1)";
  const currentTransform = new DOMMatrix(getComputedStyle(carousel).transform).m41;
  carousel.style.transform = `translateX(${currentTransform + 30}px)`;

  setTimeout(() => {
    // Main spin
    carousel.style.transition = `transform var(--spin-duration) cubic-bezier(0.05, 0.9, 0.1, 1)`;
    carousel.style.transform  = `translateX(${finalPosition}px)`;
  }, 250);

  // After spin completes
  setTimeout(() => {
    // Highlight winner
    carousel.children[finalIndex].classList.add("highlight");

    // Reveal result text with animation
    resultText.textContent = styles[randomIndex].name;
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        resultText.classList.add("visible");
        resultSub.classList.add("visible");
      });
    });

    // Particle burst celebration
    spawnParticles();

    // Re-enable button
    generateBtn.classList.remove("spinning");
    isSpinning = false;

  }, 4250); // slightly after 4s spin
}

/* ── PARTICLE BURST ──────────────────────────────────── */
// IMPROVEMENT: Confetti-style micro-celebration on reveal
function spawnParticles() {
  const container = document.getElementById("particles");
  const colors    = ["#ff4e8d","#9b4dff","#f5c97a","#ff8fcf","#c084fc","#fde68a"];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight * 0.78;

  for (let i = 0; i < 30; i++) {
    const p = document.createElement("div");
    p.classList.add("particle");

    const size  = Math.random() * 8 + 4;
    const angle = Math.random() * Math.PI * 2;
    const dist  = Math.random() * 180 + 80;
    const tx    = Math.cos(angle) * dist;
    const ty    = Math.sin(angle) * dist - 60;
    const delay = Math.random() * 0.3;
    const color = colors[Math.floor(Math.random() * colors.length)];

    p.style.cssText = `
      left: ${cx}px; top: ${cy}px;
      width: ${size}px; height: ${size}px;
      background: ${color};
      --tx: ${tx}px; --ty: ${ty}px;
      animation-delay: ${delay}s;
      animation-duration: ${0.9 + Math.random() * 0.5}s;
      box-shadow: 0 0 ${size}px ${color};
    `;
    container.appendChild(p);

    // Clean up after animation
    setTimeout(() => p.remove(), 2000);
  }
}

/* ── MODAL ───────────────────────────────────────────── */
// IMPROVEMENT: Named caption shown in modal; keyboard close support
function openModal(src, name) {
  const modal      = document.getElementById("imageModal");
  const modalImage = document.getElementById("modalImage");
  modalImage.src = src;
  modalImage.alt = name || "";
  modal.classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("imageModal").classList.remove("active");
  document.body.style.overflow = "";
}

// IMPROVEMENT: Escape key closes modal
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});

</script>
